name: Build, Test, and Publish

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 針對 ${{ matrix.os }} 進行建置
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 檢出原始碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝相依套件
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set Version
        shell: bash
        run: |
          # Extract version number from Git tag and store in env
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: 打包 (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Keep default console mode (no --windowed flag)
          pyinstaller --onefile --name "Plurk_Archive_Win_${{ env.VERSION }}" get_favorites.py

      - name: 打包 (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          pyinstaller --onefile --name "Plurk_Archive_Mac_${{ env.VERSION }}" get_favorites.py

      # --- Zip: binary + index.html + style.css (flat structure) ---

      - name: 封裝 ZIP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # PowerShell: compress binary and frontend files into a flat zip
          $zipName = "Plurk_Archive_Win_${{ env.VERSION }}.zip"
          Compress-Archive -Path `
            "dist\Plurk_Archive_Win_${{ env.VERSION }}.exe", `
            "index.html", `
            "style.css" `
            -DestinationPath $zipName

      - name: 封裝 ZIP (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # zip: -j strips directory paths so all files land at zip root (flat)
          zip -j "Plurk_Archive_Mac_${{ env.VERSION }}.zip" \
            "dist/Plurk_Archive_Mac_${{ env.VERSION }}" \
            "index.html" \
            "style.css"

      - name: 暫存成品
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.os }}
          path: Plurk_Archive_*.zip

  test:
    name: 測試執行檔 (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 下載該系統的 ZIP 成品
        uses: actions/download-artifact@v4
        with:
          name: zip-${{ matrix.os }}

      - name: 解壓縮並驗證 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Expand the zip, then smoke-test the binary
          $zip = Get-ChildItem Plurk_Archive_Win_*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath ./extracted
          $exe = Get-ChildItem ./extracted/Plurk_Archive_Win_*.exe | Select-Object -First 1
          & $exe.FullName --help; if ($LASTEXITCODE -ne 0) { Write-Host "[OK] Launch succeeded (non-zero exit ignored)" }

      - name: 解壓縮並驗證 (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Expand the zip, then smoke-test the binary
          unzip Plurk_Archive_Mac_*.zip -d ./extracted
          chmod +x ./extracted/Plurk_Archive_Mac_*
          ./extracted/Plurk_Archive_Mac_* --help || echo "[OK] Launch succeeded (non-zero exit ignored)"

  release:
    name: 建立發佈版本
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下載所有 ZIP 成品
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: zip-*
          merge-multiple: true

      - name: 上傳至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/Plurk_Archive_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
